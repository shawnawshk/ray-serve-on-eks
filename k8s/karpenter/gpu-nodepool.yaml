apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-nodepool
spec:
  disruption:
    budgets:
    - nodes: "10%"
    consolidateAfter: 300s
    consolidationPolicy: WhenEmpty
  limits:
    cpu: 5000
  template:
    metadata:
      labels:
        owner: data-engineer
        vpc.amazonaws.com/efa.present: "true"
    spec:
      expireAfter: 720h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu
      requirements:
      - key: karpenter.k8s.aws/instance-family
        operator: In
        values: ["g6", "g6e", "g7e", "p4", "p4d", "p4de", "p5", "p5en", "p6-b200"]
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot", "on-demand"]
      taints:
      - effect: NoSchedule
        key: nvidia.com/gpu
        value: "true"
  weight: 50
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu
spec:
  amiFamily: AL2023
  amiSelectorTerms:
  - alias: al2023@latest
  blockDeviceMappings:
  - deviceName: /dev/xvda
    ebs:
      encrypted: true
      volumeSize: 500Gi
      volumeType: gp3
  instanceStorePolicy: RAID0
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 1
    httpTokens: required
  role: tf-eks-demo
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: tf-eks-demo
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: tf-eks-demo
  tags:
    karpenter.sh/discovery: tf-eks-demo
